<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status | Penjahit Bintang</title>
  <link rel="stylesheet" href="assets/css/sistem.css" />
</head>
<body>

  <nav class="sistem-navbar">
    <a href="index.html" class="sistem-logo">
      <span>✦</span> Penjahit <em>Bintang</em>
    </a>
    <div class="sistem-nav-right">
      <span class="sistem-user">Halo, <strong id="namaUser">...</strong></span>
      <a href="pesan.html" class="btn-pesan-baru">+ Pesan Baru</a>
      <button class="btn-logout" id="btnLogout">Keluar</button>
    </div>
  </nav>

  <div class="sistem-container">
    <h1 class="sistem-judul">Pesanan Saya</h1>
    <p class="sistem-subjudul">Status diperbarui otomatis secara realtime.</p>

    <div class="loading-state" id="loadingPesanan" style="display:flex">
      <p>⏳ Memuat pesanan...</p>
    </div>

    <div class="kosong-state" id="pesananKosong">
      <div class="kosong-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="Black" class="bi bi-hourglass-split" viewBox="0 0 16 16">
  <path d="M2.5 15a.5.5 0 1 1 0-1h1v-1a4.5 4.5 0 0 1 2.557-4.06c.29-.139.443-.377.443-.59v-.7c0-.213-.154-.451-.443-.59A4.5 4.5 0 0 1 3.5 3V2h-1a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-1v1a4.5 4.5 0 0 1-2.557 4.06c-.29.139-.443.377-.443.59v.7c0 .213.154.451.443.59A4.5 4.5 0 0 1 12.5 13v1h1a.5.5 0 0 1 0 1zm2-13v1c0 .537.12 1.045.337 1.5h6.326c.216-.455.337-.963.337-1.5V2zm3 6.35c0 .701-.478 1.236-1.011 1.492A3.5 3.5 0 0 0 4.5 13s.866-1.299 3-1.48zm1 0v3.17c2.134.181 3 1.48 3 1.48a3.5 3.5 0 0 0-1.989-3.158C8.978 9.586 8.5 9.052 8.5 8.351z"/>
</svg></div>
      <h3 style="font-family:var(--font-display);font-size:1.25rem">Belum Ada Pesanan</h3>
      <p>Yuk buat pesanan pertamamu!</p>
      <a href="pesan.html" class="btn-auth"style="text-decoration:none;padding:0.7rem 1.5rem;text-align:center;margin-top:0.5rem">Buat Pesanan Sekarang</a>
    </div>
    <div class="daftar-pesanan" id="daftarPesanan"></div>
  </div>

  <script type="module">
    import { initHalamanStatus } from './assets/js/status.js';
    import { signOut }           from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
    import { auth }              from './assets/js/firebase.js';

    document.addEventListener('DOMContentLoaded', initHalamanStatus);
    document.getElementById('btnLogout').addEventListener('click', async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
