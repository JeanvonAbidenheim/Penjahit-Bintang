<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order | Penjahit Bintang</title>
  <link rel="stylesheet" href="assets/css/sistem.css" />
</head>
<body>

  <nav class="sistem-navbar">
    <a href="index.html" class="sistem-logo">
      <span>✦</span> Penjahit <em>Bintang</em>
    </a>
    <div class="sistem-nav-right">
      <span class="sistem-user">Halo, <strong id="namaUser">...</strong></span>
      <a href="status.html">Pesanan Saya</a>
      <button class="btn-logout" id="btnLogout"><img width="20" height="20" src="https://img.icons8.com/ios-filled/20/logout-rounded-left.png" alt="logout-rounded-left"/> Log Out</button>
      <a href="profil.html">👤 Profil</a>
    </div>
  </nav>

  <div class="sistem-container">
    <h1 class="sistem-judul">Buat Pesanan Baru</h1>
    <p class="sistem-subjudul">Isi detail pesanan, kami konfirmasi via WhatsApp.</p>

    <div class="pesan-card">
      <div id="formWrap">
        <div id="pesanNotif" class="auth-pesan"></div>
        <form class="pesan-form" id="formPesan">
          <div class="form-group">
            <label for="layanan">Jenis Layanan *</label>
            <select id="layanan" required>
              <option value="" disabled selected>-- Pilih layanan --</option>
              <option value="Permak Pakaian">Permak Pakaian</option>
              <option value="Jahit Custom Pria">Jahit Custom Pria</option>
              <option value="Jahit Custom Wanita">Jahit Custom Wanita</option>
              <option value="Seragam Sekolah">Seragam Sekolah</option>
              <option value="Seragam Kantor">Seragam Kantor</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          <div class="form-group">
            <label for="deskripsi">Deskripsi Pesanan *</label>
            <textarea id="deskripsi" rows="5"
              placeholder="Contoh: Saya ingin jahit kemeja batik lengan panjang ukuran L." required></textarea>
          </div>
          <div class="form-group">
            <label for="estimasiAmbil">Estimasi Tanggal Ambil (opsional)</label>
            <input type="date" id="estimasiAmbil" />
          </div>
          <button type="submit" class="btn-pesan">
            <span class="btn-teks">Buat Pesanan</span>
          </button>
        </form>
      </div>

      <div class="pesan-sukses" id="pesanSukses">
        <div class="sukses-icon">✓</div>
        <h2 style="font-family:var(--font-display);font-size:1.5rem">Pesanan Berhasil Dibuat!</h2>
        <p style="color:var(--abu-terang);font-size:0.9rem">Nomor order kamu:</p>
        <div class="sukses-nomor" id="nomorOrderSukses"></div>
        <p style="color:var(--abu-terang);font-size:0.85rem;max-width:320px;line-height:1.6">Kami akan menghubungi kamu via WhatsApp untuk konfirmasi pesanan.</p>
        <a href="status.html" class="btn-auth" style="text-decoration:none;text-align:center;padding:0.7rem 1.5rem;margin-top:0.5rem">Lihat Status Pesanan</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initHalamanPesan } from './assets/js/pesan.js';
    import { signOut }          from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
    import { auth }             from './assets/js/firebase.js';

    document.addEventListener('DOMContentLoaded', initHalamanPesan);
    document.getElementById('btnLogout').addEventListener('click', async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
