<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Penjahit Bintang</title>
  <link rel="stylesheet" href="assets/css/sistem.css" />
</head>
<body>

  <nav class="sistem-navbar">
    <a href="index.html" class="sistem-logo">
      <span>✦</span> Penjahit <em>Bintang</em>
    </a>
    <div class="sistem-nav-right">
      <a href="index.html">Beranda</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Penjahit <em>Bintang</em></h1>
        <p>Masuk atau buat akun untuk mulai memesan</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab tab-aktif" id="tabLogin">Masuk</button>
        <button class="auth-tab" id="tabDaftar">Daftar</button>
      </div>

      <!-- Form Login -->
      <form class="auth-form" id="formLogin">
        <div id="pesan-login" class="auth-pesan"></div>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="email@kamu.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-auth" data-teks="Masuk">
          <span class="btn-teks">Masuk</span>
        </button>
      </form>

      <!-- Form Daftar -->
      <form class="auth-form hidden" id="formDaftar">
        <div id="pesan-daftar" class="auth-pesan"></div>
        <div class="form-group">
          <label for="daftarNama">Nama Lengkap</label>
          <input type="text" id="daftarNama" placeholder="Nama lengkap kamu" required />
        </div>
        <div class="form-group">
          <label for="daftarHp">Nomor WhatsApp</label>
          <input type="tel" id="daftarHp" placeholder="08xxxxxxxxxx" required />
        </div>
        <div class="form-group">
          <label for="daftarEmail">Email</label>
          <input type="email" id="daftarEmail" placeholder="email@kamu.com" required />
        </div>
        <div class="form-group">
          <label for="daftarPassword">Password</label>
          <input type="password" id="daftarPassword" placeholder="Minimal 6 karakter" required />
        </div>
        <div class="form-group">
          <label for="daftarKonfirm">Konfirmasi Password</label>
          <input type="password" id="daftarKonfirm" placeholder="Ulangi password" required />
        </div>
        <button type="submit" class="btn-auth" data-teks="Buat Akun">
          <span class="btn-teks">Daftar</span>
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initAuth } from './assets/js/auth.js';
    document.addEventListener('DOMContentLoaded', initAuth);
  </script>
</body>
</html>
